# Evaluation test cases for the OpenEMR AI agent.
# Each case defines a user query and expected behavior.
#
# Categories:
#   happy_path   — straightforward queries the agent should handle (27)
#   edge_case    — unusual inputs that exercise error handling (15)
#   adversarial  — requests the scope guard must block (10)
#   multi_step   — queries requiring multiple tool calls (15)
#
# Total: 67 test cases

test_cases:
  # ── Happy path (21) ──────────────────────────────────────────────────────

